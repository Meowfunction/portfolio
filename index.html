<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>freezer</title>
    <link rel="stylesheet" href="index.css?v=3">
    <link rel="icon" href="images/SumOfMeow2.PNG">
    <meta name="description" content="Maple's Interactive Portfolio Website.">
</head>

<body>
    <!-- Background Canvas for Particle Animation -->
    <canvas id="bg-canvas"></canvas>

    <!-- Main Content Area -->
    <main id="app-container">
        <section id="scene-container" class="scene">
            <!-- Character Image Area -->
            <div id="character-container">
                <img id="character-img" src="images/catGreet.png" alt="Maple the Cat">
            </div>

            <!-- Interactive Dialogue UI -->
            <div id="dialogue-container">
                <div id="dialogue-bubble">
                    <p id="dialogue-text"></p>
                </div>
                <div id="controls-container">
                    <!-- Dynamic Controls (Buttons/Text Inputs) injected via JS -->
                </div>
            </div>
        </section>
    </main>

    <footer id="copyright">© 2026 Maple / meowfunction.xyz. All rights reserved. Works displayed here may not be
        reproduced, distributed, or used without explicit permission.</footer>

    <!-- Scene 2: Game Canvas -->
    <canvas id="game-canvas"></canvas>

    <!-- Scene 3: Star Field Canvas -->
    <canvas id="scene3-canvas"></canvas>

    <!-- Scene 2: Song Player Widget (top-right vinyl disk + dropdown) -->
    <div id="song-player">
        <div id="vinyl-wrapper" title="Music player">
            <img id="vinyl-disk" src="images/vinyl.PNG" alt="vinyl">
        </div>
        <div id="song-dropdown"></div>
    </div>

    <!-- Scene 2: Interact Hint -->
    <div id="interact-hint">Press <strong>Space</strong> to view</div>

    <!-- Scene 2: Song Collected Popup Toast -->
    <div id="song-popup"></div>

    <!-- Scene 2: Exhibit Modal Overlay -->
    <div id="exhibit-modal" class="exhibit-modal-overlay">
        <div class="exhibit-modal-content">
            <h2 id="exhibit-modal-title"></h2>
            <p id="exhibit-modal-desc">Description coming soon.</p>
            <button class="choice-btn" id="exhibit-close-btn">Close ✕</button>
        </div>
    </div>

    <!-- Scene 2: Artwork Modal -->
    <div id="artwork-modal" class="artwork-modal-overlay">
        <div class="artwork-page">
            <div class="artwork-title" id="artwork-title"></div>
            <img id="artwork-img" src="" alt="artwork">
            <button class="choice-btn" id="artwork-close-btn">Close ✕</button>
        </div>
    </div>

    <!-- Scene 2: Poem Page Modal -->
    <div id="poem-modal" class="poem-modal-overlay">
        <div class="poem-page">
            <div class="poem-numeral" id="poem-numeral"></div>
            <pre class="poem-body" id="poem-body"></pre>
            <button class="choice-btn poem-close-btn" id="poem-close-btn">Close ✕</button>
        </div>
    </div>

    <script src="index.js?v=3"></script>
</body>

</html>
